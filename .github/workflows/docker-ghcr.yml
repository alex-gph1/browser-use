name: docker-ghcr

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image-meta.outputs.image }}
      short_sha: ${{ steps.image-meta.outputs.short_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image-meta
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          repository="${REPOSITORY,,}"
          image="ghcr.io/${repository}"
          short_sha="$(printf '%s' "$SHA" | cut -c1-12)"

          tags=("${image}:sha-${short_sha}")
          if [[ "$REF_TYPE" == "branch" ]]; then
            safe_branch="${REF_NAME//\//-}"
            tags+=("${image}:${safe_branch}")
            if [[ "$REF_NAME" == "main" ]]; then
              tags+=("${image}:latest")
            fi
          elif [[ "$REF_TYPE" == "tag" ]]; then
            tags+=("${image}:${REF_NAME}")
          fi

          {
            printf 'image=%s\n' "$image"
            printf 'short_sha=%s\n' "$short_sha"
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.image-meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.image-meta.outputs.image }}:buildcache,mode=max

  bump-caprover-cache-buster:
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Increment and push CapRover cache buster
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Attempt ${attempt}: refreshing from origin/main and bumping CapRover cache buster"
            git fetch origin +refs/heads/main:refs/remotes/origin/main
            git checkout -B main origin/main

            python scripts/bump_caprover_cache_buster.py \
              --repository "$REPOSITORY" \
              --source-ref origin/main

            if git diff --quiet -- captain-definition; then
              echo "No CapRover changes detected."
              exit 0
            fi

            git add captain-definition
            git commit -m "ci: bump CapRover CACHE_BUSTER after Docker publish [skip ci]"

            if git push origin HEAD:refs/heads/main; then
              echo "Pushed CapRover cache-buster bump successfully."
              exit 0
            fi

            echo "Push rejected, retrying after refresh."
            git reset --hard origin/main
          done

          echo "Failed to push CapRover cache-buster bump after retries."
          exit 1
